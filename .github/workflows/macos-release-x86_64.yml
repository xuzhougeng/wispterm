name: Publish macOS Release (x86_64)

# Intel (x86_64) macOS release build. The aarch64 release (macos-release.yml)
# is tag-triggered and ships Apple Silicon only; this workflow builds, signs,
# and notarizes the x86_64 DMG and attaches it to that same GitHub release.
#
# Triggers:
#   - Automatically after "Publish macOS Release" finishes successfully for a
#     tag push (workflow_run) — no manual step needed for a normal release. By
#     the time it runs, the aarch64 job has already created the GitHub release,
#     so the Intel DMG is just uploaded to it.
#   - Manually (workflow_dispatch) with an explicit tag, e.g. to (re)build the
#     Intel DMG for an existing release.
#
# Note: the workflow_run trigger only fires once this file is on the default
# branch (GitHub requirement), so merge it to main before tagging a release.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to build the x86_64 DMG for (e.g. v1.6.0)
        required: true
        type: string
  workflow_run:
    workflows: ["Publish macOS Release"]
    types:
      - completed

permissions:
  contents: write

jobs:
  build-macos-x86_64:
    name: Build macOS (x86_64)
    runs-on: macos-15-intel
    # Manual dispatch always runs. The automatic (workflow_run) path runs only
    # when the upstream aarch64 release finished successfully for a tag push.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push')
    env:
      ZIG_GLOBAL_CACHE_DIR: ${{ github.workspace }}/.zig-global-cache

    steps:
      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ github.event.inputs.tag }}"
          else
            # For a tag push the upstream run's head_branch is the tag name.
            tag="${{ github.event.workflow_run.head_branch }}"
          fi
          if [[ ! "$tag" =~ ^(v[0-9]+\.[0-9]+\.[0-9]+|[0-9]+\.[0-9]+(\.[0-9]+)?)$ ]]; then
            echo "Release tag must match vX.Y.Z, X.Y, or X.Y.Z. Received: $tag" >&2
            exit 1
          fi
          echo "RELEASE_TAG=${tag}" >> "${GITHUB_ENV}"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.tag }}

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Cache Zig packages
        uses: actions/cache@v4
        with:
          path: |
            .zig-cache/p
            .zig-global-cache
          key: ${{ runner.os }}-x86_64-zig-0.15.2-${{ hashFiles('build.zig', 'build.zig.zon', 'pkg/**/build.zig.zon') }}
          restore-keys: |
            ${{ runner.os }}-x86_64-zig-0.15.2-

      - name: Import macOS signing certificate
        shell: bash
        env:
          MAC_CERT_P12_BASE64: ${{ secrets.MAC_CERT_P12_BASE64 }}
          MAC_CERT_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="${RUNNER_TEMP}/wispterm-build.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"
          python3 -c 'import base64, os; open("cert.p12", "wb").write(base64.b64decode(os.environ["MAC_CERT_P12_BASE64"].strip()))'

          security create-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security list-keychains -d user -s "${KEYCHAIN_PATH}"
          security default-keychain -s "${KEYCHAIN_PATH}"
          security unlock-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security set-keychain-settings -lut 21600 "${KEYCHAIN_PATH}"
          security import cert.p12 -k "${KEYCHAIN_PATH}" -P "${MAC_CERT_PASSWORD}" \
            -T /usr/bin/codesign -T /usr/bin/security -T /usr/bin/xcrun
          security set-key-partition-list -S apple-tool:,apple: -s -k "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"

          echo "Codesigning identities after import:"
          security find-identity -v -p codesigning "${KEYCHAIN_PATH}"
          codesign_identity="$(security find-identity -v -p codesigning "${KEYCHAIN_PATH}" | awk '/Developer ID Application/ {print $2; exit}')"
          if [[ -z "${codesign_identity}" ]]; then
            echo "::error::No Developer ID Application identity in keychain. Verify MAC_CERT_P12_BASE64 / MAC_CERT_PASSWORD and that the .p12 includes the private key." >&2
            exit 1
          fi
          {
            echo "WISPTERM_MACOS_SIGN_IDENTITY=${codesign_identity}"
            echo "CODESIGN_KEYCHAIN=${KEYCHAIN_PATH}"
          } >> "${GITHUB_ENV}"
          rm -f cert.p12

      - name: Store notarization credentials
        shell: bash
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          xcrun notarytool store-credentials "wispterm-notarytool" \
            --apple-id "${APPLE_ID}" \
            --team-id "${APPLE_TEAM_ID}" \
            --password "${APPLE_APP_PASSWORD}"
          echo "WISPTERM_MACOS_NOTARY_PROFILE=wispterm-notarytool" >> "${GITHUB_ENV}"

      - name: Fetch dependencies and build release
        shell: bash
        env:
          WISPTERM_MACOS_VERSION: ${{ env.RELEASE_TAG }}
        run: |
          set -euo pipefail

          retry() {
            local name="$1"; shift
            local attempts=5
            for (( attempt=1; attempt<=attempts; attempt++ )); do
              echo "::group::${name} (attempt ${attempt}/${attempts})"
              if "$@"; then
                echo "::endgroup::"
                return 0
              fi
              echo "::endgroup::"
              if (( attempt < attempts )); then
                local delay=$(( 15 * attempt ))
                (( delay > 120 )) && delay=120
                echo "::warning::${name} failed; retrying in ${delay}s"
                sleep "${delay}"
              fi
            done
            return 1
          }

          retry "zig dependency fetch" zig build -Doptimize=ReleaseFast --fetch
          retry "macos packaging" zig build macos-dist \
            -Doptimize=ReleaseFast \
            -Dtarget=x86_64-macos

      - name: Validate packaged outputs
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ env.RELEASE_TAG }}"
          dmg_tag="$tag"
          [[ "$dmg_tag" != v* ]] && dmg_tag="v$dmg_tag"
          dmg_path="zig-out/dist/macos/wispterm-macos-${dmg_tag}.dmg"

          if [[ ! -f "$dmg_path" ]]; then
            echo "DMG not found: $dmg_path" >&2
            exit 1
          fi

          codesign --verify --strict --verbose=2 "zig-out/bin/WispTerm.app"
          hdiutil verify "$dmg_path"
          xcrun stapler validate "$dmg_path"
          spctl -a -vv --type open "$dmg_path" || true

      - name: Prepare release asset
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ env.RELEASE_TAG }}"
          dmg_tag="$tag"
          [[ "$dmg_tag" != v* ]] && dmg_tag="v$dmg_tag"
          src="zig-out/dist/macos/wispterm-macos-${dmg_tag}.dmg"
          dst="wispterm-macos-x86_64-${tag}.dmg"
          cp "$src" "$dst"
          echo "ASSET_PATH=${dst}" >> "${GITHUB_ENV}"

      - name: Upload x86_64 DMG to the GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          tag="${{ env.RELEASE_TAG }}"
          if ! gh release view "${tag}" --repo "${GH_REPO}" >/dev/null 2>&1; then
            echo "::error::Release ${tag} does not exist yet. Create it first via the tag-triggered (aarch64) release, then re-run this workflow." >&2
            exit 1
          fi
          gh release upload "${tag}" "${ASSET_PATH}" --clobber --repo "${GH_REPO}"

      - name: Also upload as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: wispterm-macos-x86_64-${{ env.RELEASE_TAG }}
          path: ${{ env.ASSET_PATH }}
          if-no-files-found: error

      - name: Clean up keychain
        if: always()
        shell: bash
        run: |
          if [[ -n "${CODESIGN_KEYCHAIN:-}" && -f "${CODESIGN_KEYCHAIN}" ]]; then
            security delete-keychain "${CODESIGN_KEYCHAIN}" || true
          fi
