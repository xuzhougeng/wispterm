name: Publish macOS Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to build the aarch64 DMG for (e.g. v1.29.0)
        required: true
        type: string
  push:
    tags:
      - '[0-9]*'
      - 'v[0-9]*'

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}

jobs:
  build-macos:
    name: Build macOS (${{ matrix.arch }})
    runs-on: macos-15
    # x86_64 (Intel) is built on demand via macos-release-x86_64.yml, not here,
    # because of a toolchain issue affecting the Intel build (see issue #114).
    # The automatic tag-triggered release ships Apple Silicon (aarch64) only.
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: aarch64
            target: aarch64-macos
    env:
      ZIG_GLOBAL_CACHE_DIR: ${{ github.workspace }}/.zig-global-cache

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}

      - name: Validate release tag
        shell: bash
        run: |
          tag="${RELEASE_TAG}"
          if [[ ! "$tag" =~ ^(v[0-9]+\.[0-9]+\.[0-9]+|[0-9]+\.[0-9]+(\.[0-9]+)?)$ ]]; then
            echo "Release tag must match vX.Y.Z, X.Y, or X.Y.Z. Received: $tag" >&2
            exit 1
          fi

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Cache Zig packages
        uses: actions/cache@v4
        with:
          path: |
            .zig-cache/p
            .zig-global-cache
          key: ${{ runner.os }}-${{ matrix.arch }}-zig-0.15.2-${{ hashFiles('build.zig', 'build.zig.zon', 'pkg/**/build.zig.zon') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-zig-0.15.2-

      - name: Import macOS signing certificate
        shell: bash
        env:
          MAC_CERT_P12_BASE64: ${{ secrets.MAC_CERT_P12_BASE64 }}
          MAC_CERT_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="${RUNNER_TEMP}/wispterm-build.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"
          python3 -c 'import base64, os; open("cert.p12", "wb").write(base64.b64decode(os.environ["MAC_CERT_P12_BASE64"].strip()))'

          security create-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security list-keychains -d user -s "${KEYCHAIN_PATH}"
          security default-keychain -s "${KEYCHAIN_PATH}"
          security unlock-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security set-keychain-settings -lut 21600 "${KEYCHAIN_PATH}"
          security import cert.p12 -k "${KEYCHAIN_PATH}" -P "${MAC_CERT_PASSWORD}" \
            -T /usr/bin/codesign -T /usr/bin/security -T /usr/bin/xcrun
          security set-key-partition-list -S apple-tool:,apple: -s -k "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"

          echo "Codesigning identities after import:"
          security find-identity -v -p codesigning "${KEYCHAIN_PATH}"
          codesign_identity="$(security find-identity -v -p codesigning "${KEYCHAIN_PATH}" | awk '/Developer ID Application/ {print $2; exit}')"
          if [[ -z "${codesign_identity}" ]]; then
            echo "::error::No Developer ID Application identity in keychain. Verify MAC_CERT_P12_BASE64 / MAC_CERT_PASSWORD and that the .p12 includes the private key." >&2
            exit 1
          fi
          {
            echo "WISPTERM_MACOS_SIGN_IDENTITY=${codesign_identity}"
            echo "CODESIGN_KEYCHAIN=${KEYCHAIN_PATH}"
          } >> "${GITHUB_ENV}"
          rm -f cert.p12

      - name: Store notarization credentials
        shell: bash
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          xcrun notarytool store-credentials "wispterm-notarytool" \
            --apple-id "${APPLE_ID}" \
            --team-id "${APPLE_TEAM_ID}" \
            --password "${APPLE_APP_PASSWORD}"
          echo "WISPTERM_MACOS_NOTARY_PROFILE=wispterm-notarytool" >> "${GITHUB_ENV}"

      - name: Fetch dependencies and build release
        shell: bash
        env:
          WISPTERM_MACOS_VERSION: ${{ env.RELEASE_TAG }}
        run: |
          set -euo pipefail

          retry() {
            local name="$1"; shift
            local attempts=5
            for (( attempt=1; attempt<=attempts; attempt++ )); do
              echo "::group::${name} (attempt ${attempt}/${attempts})"
              if "$@"; then
                echo "::endgroup::"
                return 0
              fi
              echo "::endgroup::"
              if (( attempt < attempts )); then
                local delay=$(( 15 * attempt ))
                (( delay > 120 )) && delay=120
                echo "::warning::${name} failed; retrying in ${delay}s"
                sleep "${delay}"
              fi
            done
            return 1
          }

          retry "zig dependency fetch" zig build -Doptimize=ReleaseFast --fetch
          retry "macos packaging" zig build macos-dist \
            -Doptimize=ReleaseFast \
            -Dtarget=${{ matrix.target }}

      - name: Validate packaged outputs
        shell: bash
        run: |
          set -euo pipefail
          tag="${RELEASE_TAG}"
          dmg_tag="$tag"
          [[ "$dmg_tag" != v* ]] && dmg_tag="v$dmg_tag"
          dmg_path="zig-out/dist/macos/wispterm-macos-${dmg_tag}.dmg"

          if [[ ! -f "$dmg_path" ]]; then
            echo "DMG not found: $dmg_path" >&2
            exit 1
          fi

          codesign --verify --strict --verbose=2 "zig-out/bin/WispTerm.app"
          hdiutil verify "$dmg_path"
          xcrun stapler validate "$dmg_path"
          spctl -a -vv --type open "$dmg_path" || true

      - name: Prepare release asset
        shell: bash
        run: |
          set -euo pipefail
          tag="${RELEASE_TAG}"
          dmg_tag="$tag"
          [[ "$dmg_tag" != v* ]] && dmg_tag="v$dmg_tag"
          src="zig-out/dist/macos/wispterm-macos-${dmg_tag}.dmg"
          dst="wispterm-macos-${{ matrix.arch }}-${tag}.dmg"
          cp "$src" "$dst"
          echo "ASSET_PATH=${dst}" >> "${GITHUB_ENV}"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: wispterm-macos-${{ matrix.arch }}-${{ env.RELEASE_TAG }}
          path: ${{ env.ASSET_PATH }}
          if-no-files-found: error

      - name: Clean up keychain
        if: always()
        shell: bash
        run: |
          if [[ -n "${CODESIGN_KEYCHAIN:-}" && -f "${CODESIGN_KEYCHAIN}" ]]; then
            security delete-keychain "${CODESIGN_KEYCHAIN}" || true
          fi

  publish:
    name: Publish GitHub release
    needs: build-macos
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          tag="${RELEASE_TAG}"

          files=()
          while IFS= read -r -d '' f; do
            files+=("$f")
          done < <(find release-assets -type f -name '*.dmg' -print0 | sort -z)

          if [[ ${#files[@]} -eq 0 ]]; then
            echo "No macOS DMG assets found" >&2
            exit 1
          fi

          asset_notes=$(printf '%s\n' \
            'macOS assets included in this release:' \
            '' \
            '- aarch64 DMG: native build for Apple Silicon Macs' \
            '' \
            'The Intel (x86_64) DMG is published separately on demand via the "Publish macOS Release (x86_64)" workflow.' \
            '' \
            'DMGs are signed with a Developer ID Application certificate and notarized by Apple.')

          release_notes_path="release-notes/${tag}.md"
          if [[ -f "${release_notes_path}" ]]; then
            curated="$(cat "${release_notes_path}")"
            curated_trimmed="$(printf '%s' "${curated}" | awk 'NF {found=1} found' )"
            if [[ -n "${curated_trimmed}" ]]; then
              notes="$(printf '%s\n\n%s\n' "${curated}" "${asset_notes}")"
            else
              notes="${asset_notes}"
            fi
          else
            notes="${asset_notes}"
          fi

          if gh release view "${tag}" --repo "${GH_REPO}" >/dev/null 2>&1; then
            gh release upload "${tag}" "${files[@]}" --clobber --repo "${GH_REPO}"
          else
            gh release create "${tag}" "${files[@]}" \
              --repo "${GH_REPO}" \
              --verify-tag \
              --generate-notes \
              --notes "${notes}"
          fi
