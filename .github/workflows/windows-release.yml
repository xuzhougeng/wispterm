name: Publish Windows Release

on:
  push:
    tags:
      - '[0-9]*'
      - 'v[0-9]*'

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows Artifacts
    runs-on: windows-latest
    env:
      ZIG_GLOBAL_CACHE_DIR: ${{ github.workspace }}\.zig-global-cache

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate release tag
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ($tag -notmatch '^(v\d+\.\d+\.\d+|\d+\.\d+(\.\d+)?)$') {
            throw "Release tag must match vX.Y.Z, X.Y, or X.Y.Z. Received: $tag"
          }

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2
      - name: Cache Zig packages
        uses: actions/cache@v4
        with:
          path: |
            .zig-cache/p
            .zig-global-cache
          key: ${{ runner.os }}-zig-0.15.2-${{ hashFiles('build.zig', 'build.zig.zon', 'pkg/**/build.zig.zon') }}
          restore-keys: |
            ${{ runner.os }}-zig-0.15.2-

      - name: Fetch dependencies and build release
        shell: pwsh
        run: |
          function Invoke-WithRetry {
            param(
              [Parameter(Mandatory = $true)][string]$Name,
              [Parameter(Mandatory = $true)][scriptblock]$Command,
              [int]$Attempts = 5
            )

            $exitCode = 1
            for ($attempt = 1; $attempt -le $Attempts; $attempt++) {
              Write-Host "::group::$Name (attempt $attempt/$Attempts)"
              & $Command
              $exitCode = if ($null -ne $LASTEXITCODE) { $LASTEXITCODE } elseif ($?) { 0 } else { 1 }
              Write-Host "::endgroup::"

              if ($exitCode -eq 0) {
                return
              }

              if ($attempt -lt $Attempts) {
                $delay = [Math]::Min(120, 15 * $attempt)
                Write-Warning "$Name failed with exit code $exitCode. Retrying in $delay seconds..."
                Start-Sleep -Seconds $delay
              }
            }

            exit $exitCode
          }

          Invoke-WithRetry -Name "zig dependency fetch" -Command { zig build -Doptimize=ReleaseFast --fetch }
          Invoke-WithRetry -Name "windows packaging" -Command { powershell -ExecutionPolicy Bypass -File .\packaging\windows\package.ps1 -Version "${{ github.ref_name }}" }

      - name: Validate packaged outputs
        shell: pwsh
        run: |
          $portableExe = "zig-out\dist\portable\wispterm.exe"
          $portableVersion = "zig-out\dist\portable\version.txt"
          $portablePluginSkills = "zig-out\dist\portable\plugins\skills"
          $portableCompatExe = "zig-out\dist\portable-compat\wispterm.exe"
          $portableCompatVersion = "zig-out\dist\portable-compat\version.txt"
          $portableCompatWebView2Loader = "zig-out\dist\portable-compat\WebView2Loader.dll"
          $portableCompatConPty = "zig-out\dist\portable-compat\conpty.dll"
          $portableCompatConsoleHost = "zig-out\dist\portable-compat\OpenConsole.exe"
          $portableCompatPluginSkills = "zig-out\dist\portable-compat\plugins\skills"
          $portableNativeD3D11Exe = "zig-out\dist\portable-native-d3d11\wispterm.exe"
          $portableNativeD3D11Version = "zig-out\dist\portable-native-d3d11\version.txt"
          $portableNativeD3D11PluginSkills = "zig-out\dist\portable-native-d3d11\plugins\skills"
          $skillFiles = @(
            "plugins\skills\inspect-computer-config\SKILL.md",
            "plugins\skills\inspect-computer-config\scripts\inspect_computer_config.py"
          )

          if (!(Test-Path $portableExe)) {
            throw "Portable executable not found: $portableExe"
          }

          if (!(Test-Path $portableVersion)) {
            throw "Portable version file not found: $portableVersion"
          }

          if (!(Test-Path $portablePluginSkills -PathType Container)) {
            throw "Portable plugin skills directory not found: $portablePluginSkills"
          }

          if (!(Test-Path $portableCompatExe)) {
            throw "Portable compat executable not found: $portableCompatExe"
          }

          if (!(Test-Path $portableCompatVersion)) {
            throw "Portable compat version file not found: $portableCompatVersion"
          }

          if (!(Test-Path $portableCompatWebView2Loader)) {
            throw "Portable compat WebView2 loader not found: $portableCompatWebView2Loader"
          }

          if (!(Test-Path $portableCompatConPty)) {
            throw "Portable compat conpty.dll not found: $portableCompatConPty"
          }

          if (!(Test-Path $portableCompatConsoleHost)) {
            throw "Portable compat OpenConsole.exe not found: $portableCompatConsoleHost"
          }

          if (!(Test-Path $portableCompatPluginSkills -PathType Container)) {
            throw "Portable compat plugin skills directory not found: $portableCompatPluginSkills"
          }

          if (!(Test-Path $portableNativeD3D11Exe)) {
            throw "Portable native D3D11 executable not found: $portableNativeD3D11Exe"
          }

          if (!(Test-Path $portableNativeD3D11Version)) {
            throw "Portable native D3D11 version file not found: $portableNativeD3D11Version"
          }

          if (!(Test-Path $portableNativeD3D11PluginSkills -PathType Container)) {
            throw "Portable native D3D11 plugin skills directory not found: $portableNativeD3D11PluginSkills"
          }

          foreach ($distDir in @("zig-out\dist\portable", "zig-out\dist\portable-compat", "zig-out\dist\portable-native-d3d11")) {
            foreach ($skillFile in $skillFiles) {
              $path = Join-Path $distDir $skillFile
              if (!(Test-Path $path)) {
                throw "Bundled skill file not found: $path"
              }
            }
          }

      - name: Build diagnostic (debug-console) bundle
        shell: pwsh
        run: |
          # Dependencies were already fetched by the release build step above, so
          # package.ps1's -DebugConsole branch does the (single) debug build itself.
          powershell -ExecutionPolicy Bypass -File .\packaging\windows\package.ps1 -DebugConsole -Optimize ReleaseSafe
          if (!(Test-Path "zig-out\dist\portable-debug\wispterm.exe")) {
            throw "Debug bundle not found: zig-out\dist\portable-debug\wispterm.exe"
          }

      - name: Create release assets
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $portableAsset = "wispterm-windows-portable-$tag.zip"
          $portableCompatAsset = "wispterm-windows-portable-compat-$tag.zip"
          $portableNativeD3D11Asset = "wispterm-windows-portable-native-d3d11-$tag.zip"
          $debugAsset = "wispterm-windows-debug-$tag.zip"

          if (Test-Path $portableAsset) {
            Remove-Item $portableAsset -Force
          }
          if (Test-Path $portableCompatAsset) {
            Remove-Item $portableCompatAsset -Force
          }
          if (Test-Path $portableNativeD3D11Asset) {
            Remove-Item $portableNativeD3D11Asset -Force
          }
          if (Test-Path $debugAsset) { Remove-Item $debugAsset -Force }

          Compress-Archive -Path zig-out\dist\portable\* -DestinationPath $portableAsset -Force
          Compress-Archive -Path zig-out\dist\portable-compat\* -DestinationPath $portableCompatAsset -Force
          Compress-Archive -Path zig-out\dist\portable-native-d3d11\* -DestinationPath $portableNativeD3D11Asset -Force
          Compress-Archive -Path zig-out\dist\portable-debug\* -DestinationPath $debugAsset -Force

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: wispterm-windows-portable-${{ github.ref_name }}
          path: wispterm-windows-portable-${{ github.ref_name }}.zip
          if-no-files-found: error

      - name: Upload portable compat artifact
        uses: actions/upload-artifact@v4
        with:
          name: wispterm-windows-portable-compat-${{ github.ref_name }}
          path: wispterm-windows-portable-compat-${{ github.ref_name }}.zip
          if-no-files-found: error

      - name: Upload portable native D3D11 artifact
        uses: actions/upload-artifact@v4
        with:
          name: wispterm-windows-portable-native-d3d11-${{ github.ref_name }}
          path: wispterm-windows-portable-native-d3d11-${{ github.ref_name }}.zip
          if-no-files-found: error

      - name: Upload diagnostic artifact
        uses: actions/upload-artifact@v4
        with:
          name: wispterm-windows-debug-${{ github.ref_name }}
          path: wispterm-windows-debug-${{ github.ref_name }}.zip
          if-no-files-found: error

      - name: Publish GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $portableAsset = "wispterm-windows-portable-$tag.zip"
          $portableCompatAsset = "wispterm-windows-portable-compat-$tag.zip"
          $portableNativeD3D11Asset = "wispterm-windows-portable-native-d3d11-$tag.zip"
          $debugAsset = "wispterm-windows-debug-$tag.zip"

          if (!(Test-Path $portableAsset)) {
            throw "Portable release asset not found: $portableAsset"
          }
          if (!(Test-Path $portableCompatAsset)) {
            throw "Portable compat release asset not found: $portableCompatAsset"
          }
          if (!(Test-Path $portableNativeD3D11Asset)) {
            throw "Portable native D3D11 release asset not found: $portableNativeD3D11Asset"
          }
          if (!(Test-Path $debugAsset)) {
            throw "Diagnostic release asset not found: $debugAsset"
          }

          gh release view $tag --repo $env:GITHUB_REPOSITORY *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $portableAsset $portableCompatAsset $portableNativeD3D11Asset $debugAsset --repo $env:GITHUB_REPOSITORY --clobber
          } else {
            $assetNotes = @(
              "Windows assets included in this release:",
              "",
              "- Portable: default OpenGL zip archive containing wispterm.exe",
              "- Portable compat: OpenGL zip archive for older Windows 10 machines - bundles WebView2Loader.dll for the embedded browser plus a modern ConPTY (conpty.dll + OpenConsole.exe) so TUI apps like Codex and Claude Code get mouse scrolling and scrollbars",
              "- Portable native D3D11: feedback zip archive using the Windows native D3D11 renderer; use the default Portable asset if you hit rendering issues",
              "- Diagnostic (debug): console build with on-disk logging + crash reports for troubleshooting (ReleaseSafe). See docs/windows-debug-build.md.",
              "",
              "Portable builds can add or remove WispTerm from Windows Search and enable or disable startup from Settings."
            ) -join "`n"

            $releaseNotesPath = Join-Path "release-notes" "$tag.md"
            if (Test-Path $releaseNotesPath) {
              $curatedNotes = (Get-Content $releaseNotesPath -Raw).Trim()
              if (![string]::IsNullOrWhiteSpace($curatedNotes)) {
                $notes = @($curatedNotes, "", $assetNotes) -join "`n"
              } else {
                $notes = $assetNotes
              }
            } else {
              $notes = $assetNotes
            }

            gh release create $tag $portableAsset $portableCompatAsset $portableNativeD3D11Asset $debugAsset `
              --repo $env:GITHUB_REPOSITORY `
              --verify-tag `
              --generate-notes `
              --notes $notes
          }
