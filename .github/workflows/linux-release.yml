name: Publish Linux Release

# Builds and publishes the Linux AppImage. Mirrors the macOS/Windows release
# workflows: on a version tag it builds the AppImage and attaches it to the
# GitHub release for that tag, adding a "Linux asset included in this release"
# notes section. SDL3 is built from source (not yet in distro repos);
# fontconfig/freetype come from apt. See packaging/linux/build-appimage.sh.
#
# Built on ubuntu-22.04 on purpose: the older glibc keeps the AppImage runnable
# on a wider range of distros.
#
# NOTE: the Linux build is EXPERIMENTAL. The maintainer has no Linux desktop to
# test it on, so it ships for community testing — the release notes block below
# spells that out and asks testers to analyze problems with an AI assistant
# before filing an issue.

on:
  push:
    tags:
      - '[0-9]*'
      - 'v[0-9]*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  appimage:
    name: Build & publish Linux AppImage
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Validate release tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          tag="${{ github.ref_name }}"
          if [[ ! "$tag" =~ ^(v[0-9]+\.[0-9]+\.[0-9]+|[0-9]+\.[0-9]+(\.[0-9]+)?)$ ]]; then
            echo "Release tag must match vX.Y.Z, X.Y, or X.Y.Z. Received: $tag" >&2
            exit 1
          fi

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libfontconfig1-dev libfreetype-dev libgl1-mesa-dev \
            libx11-dev libxext-dev libxcursor-dev libxi-dev \
            libxrandr-dev \
            libwayland-dev libxkbcommon-dev \
            cmake ninja-build curl libfuse2

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build and install SDL3
        run: |
          SDL_VER=3.4.10
          curl -fSL --retry 5 --retry-all-errors --retry-delay 3 \
            "https://github.com/libsdl-org/SDL/releases/download/release-${SDL_VER}/SDL3-${SDL_VER}.tar.gz" | tar -xz
          cmake -S "SDL3-${SDL_VER}" -B sdl-build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr/local -DSDL_TEST_LIBRARY=OFF
          cmake --build sdl-build --parallel
          sudo cmake --install sdl-build
          sudo ldconfig

      - name: Build AppImage
        run: ./packaging/linux/build-appimage.sh

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: wispterm-linux-x86_64-appimage
          path: zig-out/WispTerm-*-x86_64.AppImage
          if-no-files-found: error

      - name: Publish AppImage to the GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          tag="${{ github.ref_name }}"

          asset="$(find zig-out -maxdepth 1 -type f -name 'WispTerm-*-x86_64.AppImage' | head -1)"
          if [[ -z "${asset}" ]]; then
            echo "No AppImage asset found in zig-out" >&2
            exit 1
          fi

          asset_notes=$(printf '%s\n' \
            'Linux asset included in this release:' \
            '' \
            '- AppImage: portable, self-contained x86_64 build (bundles SDL3). Run `chmod +x WispTerm-*-x86_64.AppImage && ./WispTerm-*-x86_64.AppImage`; on hosts without FUSE add `--appimage-extract-and-run`.' \
            '' \
            '> ⚠️ The Linux build is **experimental and not yet stable**. The maintainer has no Linux desktop environment to test it on, so community testing is very welcome. If you hit a problem, please ask an AI assistant to help analyze it first, then open an issue with the details: https://github.com/${{ github.repository }}/issues/new' \
            '>' \
            '> ⚠️ Linux 版本目前为**实验性质，尚不稳定**，且作者没有 Linux 桌面环境进行测试，欢迎社区参与测试。如遇到问题，请先用 AI 协助分析，然后到这里提交 issue：https://github.com/${{ github.repository }}/issues/new')

          # The Linux job is the slowest (it builds SDL3 from source), so the
          # release was almost certainly already created by the macOS/Windows
          # workflow. In that case just upload the asset and make sure the Linux
          # notes section is appended to the body (idempotent via the grep gate).
          if gh release view "${tag}" --repo "${GH_REPO}" >/dev/null 2>&1; then
            gh release upload "${tag}" "${asset}" --clobber --repo "${GH_REPO}"
            body="$(gh release view "${tag}" --repo "${GH_REPO}" --json body --jq '.body')"
            if ! printf '%s' "${body}" | grep -qF 'Linux asset included in this release:'; then
              gh release edit "${tag}" --repo "${GH_REPO}" \
                --notes "$(printf '%s\n\n%s\n' "${body}" "${asset_notes}")"
            fi
          else
            release_notes_path="release-notes/${tag}.md"
            if [[ -f "${release_notes_path}" ]]; then
              curated="$(cat "${release_notes_path}")"
              curated_trimmed="$(printf '%s' "${curated}" | awk 'NF {found=1} found')"
              if [[ -n "${curated_trimmed}" ]]; then
                notes="$(printf '%s\n\n%s\n' "${curated}" "${asset_notes}")"
              else
                notes="${asset_notes}"
              fi
            else
              notes="${asset_notes}"
            fi
            gh release create "${tag}" "${asset}" \
              --repo "${GH_REPO}" \
              --verify-tag \
              --generate-notes \
              --notes "${notes}"
          fi
